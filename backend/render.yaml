services:
  - type: web
    name: vidsense-ai-backend
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: OUTPUT_DIR
        value: outputs
      - key: TEMP_DIR
        value: temp
